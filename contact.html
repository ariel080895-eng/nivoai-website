<div class="a11y-widget">

    </svg>
  </button>

  <div class="a11y-panel" id="a11yPanel" role="menu" aria-hidden="true">
    <h4>נגישות</h4>
    <button data-a11y="text-up">הגדלת טקסט <span>A+</span></button>
    <button data-a11y="text-down">הקטנת טקסט <span>A-</span></button>
    <button data-a11y="contrast">ניגודיות גבוהה</button>
    <button data-a11y="underline">הדגשת קישורים</button>
    <button data-a11y="stop-motion">עצירת אנימציות</button>
    <button data-a11y="reset" class="a11y-reset">איפוס הגדרות</button>
  </div>
</div>

<script>
(function () {
  var root = document.documentElement;
  var toggle = document.getElementById('a11yToggle');
  var panel = document.getElementById('a11yPanel');
  var STORAGE_KEY = 'nivoai-a11y';
  var textScale = 0;

  function apply(state) {
    textScale = state.textScale || 0;
    root.style.fontSize = (100 + textScale * 10) + '%';
    root.classList.toggle('a11y-contrast', !!state.contrast);
    root.classList.toggle('a11y-underline', !!state.underline);
    root.classList.toggle('a11y-stop-motion', !!state.stopMotion);
  }

  function save(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function load() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch (e) {
      return {};
    }
  }

  var state = load();
  apply(state);

  toggle.addEventListener('click', function () {
    var isOpen = panel.classList.toggle('open');
    toggle.setAttribute('aria-expanded', String(isOpen));
    panel.setAttribute('aria-hidden', String(!isOpen));
  });

  document.addEventListener('click', function (e) {
    if (!e.target.closest('.a11y-widget')) {
      panel.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
      panel.setAttribute('aria-hidden', 'true');
    }
  });

  panel.querySelectorAll('button[data-a11y]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var action = btn.dataset.a11y;
      var current = load();
      if (action === 'text-up') current.textScale = Math.min((current.textScale || 0) + 1, 4);
      else if (action === 'text-down') current.textScale = Math.max((current.textScale || 0) - 1, -2);
      else if (action === 'contrast') current.contrast = !current.contrast;
      else if (action === 'underline') current.underline = !current.underline;
      else if (action === 'stop-motion') current.stopMotion = !current.stopMotion;
      else if (action === 'reset') current = {};
      save(current);
      apply(current);
    });
  });
})();
</script>

<script>
(function () {
  var CONTACT_ENDPOINT = 'https://whatsapp-claude-bot-5pcp.onrender.com/contact';
  var form = document.getElementById('contactForm');
  var overlay = document.getElementById('contactModalOverlay');
  var closeBtn = document.getElementById('contactModalClose');
  if (!form) return;

  function openModal() {
    overlay.classList.add('open');
  }

  function closeModal() {
    overlay.classList.remove('open');
  }

  closeBtn.addEventListener('click', closeModal);
  overlay.addEventListener('click', function (e) {
    if (e.target === overlay) closeModal();
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var submitBtn = form.querySelector('button[type="submit"]');
    var data = {
      name: form.name.value,
      email: form.email.value,
      phone: form.phone.value,
      message: form.message.value,
    };

    submitBtn.disabled = true;

    fetch(CONTACT_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    })
      .then(function (res) {
        if (!res.ok) throw new Error('Request failed');
        form.reset();
        openModal();
      })
      .catch(function () {
        alert('משהו השתבש בשליחה, נסו שוב או צרו קשר ישירות בוואטסאפ.');
      })
      .finally(function () {
        submitBtn.disabled = false;
      });
  });
})();
</script>
