<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; }
  .logo-square {
    width: 800px;
    height: 800px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-text {
    font-family: 'Marcellus', serif;
    font-size: 110px;
    letter-spacing: 1px;
    color: #111111;
  }
  .logo-text .accent {
    color: #0FA968;
  }
</style>
</head>
<body>
  <div class="logo-square">
    <span class="logo-text">Nivo<span class="accent">AI</span></span>
  </div>
</body>
</html>
